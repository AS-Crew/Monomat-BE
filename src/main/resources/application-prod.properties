#==========================================
#  Production 환경 설정 파일
#==========================================
# 1. Database 설정 (OCI MySQL 8.x DB)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# 2. dotenv 환경 변수 설정
spring.datasource.url=${OCI_DB_URL}
spring.datasource.username=${OCI_DB_USERNAME}
spring.datasource.password=${OCI_DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10


# 3. JPA / Hibernate 설정
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# 4. Redis 설정
spring.data.redis.host=${OCI_REDIS_HOST}
spring.data.redis.port=${OCI_REDIS_PORT}


# 5. 로깅 설정
# Spring Boot 4.x: SQL + 바인딩 파라미터 로그 prod에서는 로그 레벨 최소화
logging.level.root=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.io.github.ascrew.monomatbe=INFO
logging.level.org.hibernate.orm.jdbc.bind=ERROR


# 6. Java Virtual Thread 활성화
spring.threads.virtual.enabled=true