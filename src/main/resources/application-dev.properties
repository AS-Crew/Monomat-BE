# 1. Database 설정 (OCI MySQL 8.x DB)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# 2. dotenv 환경 변수 설정
spring.datasource.url=${OCI_DB_URL}
spring.datasource.username=${OCI_DB_USERNAME}
spring.datasource.password=${OCI_DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10


# 2. JPA / Hibernate 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# 3. Redis 설정
spring.data.redis.host=${OCI_REDIS_HOST}
spring.data.redis.port=${OCI_REDIS_PORT}


# 4. 로깅 설정
# Spring Boot 4.x: SQL + 바인딩 파라미터 로그
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE


# 5. Java Virtual Thread 활성화
spring.threads.virtual.enabled=true