# Application
spring.application.name=Monomat-BE

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# MySQL 8.x Database Configuration
# hyeon님의 .env 설정과 동일하게 맞췄습니다.
spring.datasource.url=jdbc:mysql://localhost:3306/monomat_dev?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=monomat
spring.datasource.password=monomat123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
# MySQL8Dialect -> MySQLDialect로 수정 (Hibernate 최신 버전 대응)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Server Configuration
server.port=8080
# 모든 API 주소 앞에 /api가 붙습니다 (예: localhost:8080/api/...)
server.servlet.context-path=/api